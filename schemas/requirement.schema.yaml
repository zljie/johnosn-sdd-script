$schema: https://json-schema.org/draft/2020-12/schema
$id: https://agent-sdd.dev/schemas/requirement.schema.yaml
title: Requirement
description: Requirement Artifact (REQ) produced by Requirement Agent.
version: 1.0.0

type: object
additionalProperties: false
required:
  - id
  - title
  - summary
  - businessGoal
  - businessValue
  - targetUsers
  - scope
  - outOfScope
  - functionalRequirements
  - nonFunctionalRequirements
  - constraints
  - assumptions
  - openQuestions
  - risks
  - priority
  - status
properties:
  id:
    type: string
    pattern: '^REQ-[0-9]{3,}$'
  title:
    type: string
    minLength: 1
    maxLength: 200
  summary:
    type: string
    minLength: 1
  businessGoal:
    type: string
    minLength: 1
  businessValue:
    type: string
    minLength: 1
  targetUsers:
    type: array
    minItems: 1
    items:
      type: string
  scope:
    type: array
    items:
      type: string
  outOfScope:
    type: array
    items:
      type: string
  functionalRequirements:
    type: array
    minItems: 1
    items:
      type: string
  nonFunctionalRequirements:
    type: array
    minItems: 1
    items:
      type: string
  constraints:
    type: array
    items:
      type: string
  dependencies:
    type: array
    items:
      type: string
  assumptions:
    type: array
    items:
      type: string
  openQuestions:
    type: array
    items:
      type: object
      required: [question]
      properties:
        question:
          type: string
        impact:
          type: string
  risks:
    type: array
    items:
      type: object
      required: [risk, mitigation]
      properties:
        risk:
          type: string
        mitigation:
          type: string
  priority:
    type: string
    enum: [Critical, High, Medium, Low]
  status:
    type: string
    enum: [Draft, Ready, Approved, Implemented, Verified, Released, Archived]
  traceability:
    type: object
    additionalProperties: false
    properties:
      parent:
        type: string
        pattern: '^null$'  # REQ has no parent
      children:
        type: array
        items:
          type: string
          pattern: '^PS-[0-9]{3,}$'
  metadata:
    type: object
    additionalProperties: false
    properties:
      owner:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      version:
        type: string
