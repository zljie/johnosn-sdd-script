$schema: https://json-schema.org/draft/2020-12/schema
$id: https://agent-sdd.dev/schemas/testcase.schema.yaml
title: TestCase
description: |
  Test Case artifact (TC) produced by Product Manager Agent (initial positive/negative/boundary/exception)
  and fully detailed by Tester Agent during Testing Flow.
  Test Cases are the executable link between Acceptance Criteria and Quality Evidence Package (QEP).
version: 1.0.0

type: object
additionalProperties: false
required:
  - id
  - title
  - type
  - priority
  - preconditions
  - steps
  - expectedResult
  - status
  - traceability
properties:
  id:
    type: string
    pattern: '^TC-[0-9]{3,}$'
  title:
    type: string
    minLength: 1
    maxLength: 200
  description:
    type: string
  type:
    type: string
    enum:
      - Positive
      - Negative
      - Boundary
      - Exception
      - Regression
      - Smoke
      - E2E
      - Performance
      - Security
  priority:
    type: string
    enum: [P0, P1, P2, P3]
  severity:
    type: string
    enum: [Critical, High, Medium, Low, Informational]
  preconditions:
    type: array
    items:
      type: string
      minLength: 1
  steps:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [order, action]
      properties:
        order:
          type: integer
          minimum: 1
        action:
          type: string
        data:
          type: object
          additionalProperties: true
        expectedResponse:
          type: string
  expectedResult:
    type: string
    minLength: 1
  testData:
    type: object
    additionalProperties: true
    description: Optional fixtures, payloads, or test data references.
  automation:
    type: object
    additionalProperties: false
    properties:
      automated:
        type: boolean
        default: false
      framework:
        type: string
        description: e.g. JUnit, pytest, Cypress, Playwright.
      scriptRef:
        type: string
        description: Path or ID of the automated test script.
      ciTag:
        type: string
  execution:
    type: object
    additionalProperties: false
    properties:
      status:
        type: string
        enum: [NotRun, Passed, Failed, Blocked, Skipped]
      lastRunAt:
        type: string
        format: date-time
      duration:
        type: number
        description: Execution duration in seconds.
      evidenceRefs:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [type, ref]
          properties:
            type:
              type: string
              enum: [Log, Screenshot, APIResponse, Trace, Report, Video]
            ref:
              type: string
      defectRefs:
        type: array
        items:
          type: string
          pattern: '^BUG-[0-9]{3,}$'
  status:
    type: string
    enum: [Draft, Ready, InProgress, Passed, Failed, Blocked, Deprecated]
  traceability:
    type: object
    additionalProperties: false
    required: [storyId, acceptanceCriteriaIds]
    properties:
      storyId:
        type: string
        pattern: '^US-[0-9]{3,}$'
      productSpecId:
        type: string
        pattern: '^PS-[0-9]{3,}$'
      requirementId:
        type: string
        pattern: '^REQ-[0-9]{3,}$'
      acceptanceCriteriaIds:
        type: array
        minItems: 1
        items:
          type: string
      architectureDesignId:
        type: string
        pattern: '^AD-[0-9]{3,}$'
  tags:
    type: array
    items:
      type: string
  metadata:
    type: object
    additionalProperties: false
    properties:
      owner:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      version:
        type: string
