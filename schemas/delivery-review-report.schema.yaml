$schema: https://json-schema.org/draft/2020-12/schema
$id: https://agent-sdd.dev/schemas/delivery-review-report.schema.yaml
title: DeliveryReviewReport
description: Delivery Review Report (DRR) produced by Reviewer Agent.
version: 1.0.0

type: object
additionalProperties: false
required: [id, version, reviewer, reviewDate, scope, overallStatus, requirementReview, productReview, technicalReview, architectureReview, implementationReview, testingReview, riskAssessment, qualityGates, finalDecision, status]
properties:
  id:
    type: string
    pattern: '^DRR-[0-9]{3,}$'
  version:
    type: string
  reviewer:
    type: string
  reviewDate:
    type: string
    format: date-time
  scope:
    type: string
  overallStatus:
    type: string
    enum: [Approved, Approved with Conditions, Needs Rework, Rejected]
  requirementReview:
    type: object
    properties:
      completeness:
        type: string
        enum: [PASS, FAIL]
      findings:
        type: array
        items:
          type: string
  productReview:
    type: object
    properties:
      acceptanceCompliance:
        type: string
        enum: [PASS, FAIL]
      findings:
        type: array
        items:
          type: string
  technicalReview:
    type: object
    properties:
      feasibility:
        type: string
        enum: [PASS, FAIL]
      findings:
        type: array
        items:
          type: string
  architectureReview:
    type: object
    properties:
      conformance:
        type: string
        enum: [PASS, FAIL]
      findings:
        type: array
        items:
          type: string
  implementationReview:
    type: object
    properties:
      buildValidation:
        type: string
        enum: [PASS, FAIL]
      codeQuality:
        type: string
        enum: [PASS, FAIL]
  testingReview:
    type: object
    properties:
      evidenceCompletess:
        type: string
        enum: [PASS, FAIL]
      findings:
        type: array
        items:
          type: string
  riskAssessment:
    type: array
    items:
      type: object
      required: [risk, severity, status]
      properties:
        risk:
          type: string
        severity:
          type: string
          enum: [Low, Medium, High]
        status:
          type: string
          enum: [Open, Accepted, Closed]
  qualityGates:
    type: array
    items:
      type: object
      required: [gate, result]
      properties:
        gate:
          type: string
        result:
          type: string
          enum: [PASS, FAIL, CONDITIONAL PASS]
  findings:
    type: array
    items:
      type: object
      required: [id, category, severity, description, recommendation]
      properties:
        id:
          type: string
        category:
          type: string
        severity:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        description:
          type: string
        recommendation:
          type: string
  finalDecision:
    type: string
    enum: [Approved, Approved with Conditions, Needs Rework, Rejected]
  status:
    type: string
    enum: [Draft, Review, Approved, Archived]
  traceability:
    type: object
    properties:
      qualityEvidencePackageId:
        type: string
        pattern: '^QEP-[0-9]{3,}$'
      softwareDeliveryPackageId:
        type: string
        pattern: '^SDP-[0-9]{3,}$'
  metadata:
    type: object
    properties:
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
