$schema: https://json-schema.org/draft/2020-12/schema
$id: https://agent-sdd.dev/schemas/api.schema.yaml
title: API
description: |
  API Contract artifact produced by Architecture Agent as part of Architecture Design (AD).
  Defines the interface contract only — no implementation, no controller code.
  Consumes Technical Specification and is consumed by Frontend/Backend agents.
version: 1.0.0

type: object
additionalProperties: false
required:
  - id
  - method
  - path
  - version
  - request
  - response
  - errorCodes
  - status
  - traceability
properties:
  id:
    type: string
    pattern: '^API-[0-9]{3,}$'
  name:
    type: string
    minLength: 1
    maxLength: 200
  method:
    type: string
    enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
  path:
    type: string
    pattern: '^/[a-zA-Z0-9/_:\-{}]+$'
  version:
    type: string
    description: API contract version, e.g. "v1".
    pattern: '^v[0-9]+(\.[0-9]+)?$'
  description:
    type: string
  owner:
    type: string
    description: Owning service/component.
  authorization:
    type: object
    additionalProperties: false
    required: [required]
    properties:
      required:
        type: boolean
      schemes:
        type: array
        items:
          type: string
          enum: [JWT, OAuth2, APIKey, Basic, MTLS, None]
      scopes:
        type: array
        items:
          type: string
      roles:
        type: array
        items:
          type: string
  request:
    type: object
    additionalProperties: false
    required: [contentType]
    properties:
      contentType:
        type: string
        enum: [application/json, application/x-www-form-urlencoded, multipart/form-data, text/plain, application/octet-stream]
      headers:
        type: array
        items:
          $ref: '#/$defs/field'
      query:
        type: array
        items:
          $ref: '#/$defs/field'
      pathParams:
        type: array
        items:
          $ref: '#/$defs/field'
      body:
        $ref: '#/$defs/schema'
      required:
        type: boolean
  response:
    type: object
    additionalProperties: false
    required: [success]
    properties:
      success:
        type: object
        additionalProperties: false
        required: [status, body]
        properties:
          status:
            type: integer
            minimum: 100
            maximum: 599
          contentType:
            type: string
          body:
            $ref: '#/$defs/schema'
  errorCodes:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [code, status, message]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{2,}$'
        status:
          type: integer
          minimum: 400
          maximum: 599
        message:
          type: string
        category:
          type: string
          enum: [Validation, Business, Infrastructure, Security]
  idempotent:
    type: boolean
    default: false
  rateLimit:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
      requestsPerMinute:
        type: integer
        minimum: 1
  observability:
    type: object
    additionalProperties: false
    properties:
      traceEnabled:
        type: boolean
        default: true
      metricsEnabled:
        type: boolean
        default: true
      auditLog:
        type: boolean
        default: false
  status:
    type: string
    enum: [Draft, Frozen, Deprecated]
  traceability:
    type: object
    additionalProperties: false
    required: [architectureDesignId, storyIds]
    properties:
      architectureDesignId:
        type: string
        pattern: '^AD-[0-9]{3,}$'
      storyIds:
        type: array
        minItems: 1
        items:
          type: string
          pattern: '^US-[0-9]{3,}$'
      dataModelRefs:
        type: array
        items:
          type: string
          pattern: '^MODEL-[0-9]{3,}$'
  metadata:
    type: object
    additionalProperties: false
    properties:
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      version:
        type: string

$defs:
  field:
    type: object
    additionalProperties: false
    required: [name, type]
    properties:
      name:
        type: string
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        type: string
        enum: [string, integer, number, boolean, array, object, null]
      required:
        type: boolean
        default: false
      description:
        type: string
      example:
      default:
      enum:
        type: array
        items: {}
      format:
        type: string
        description: Optional format hint, e.g. date, email, uuid.

  schema:
    type: object
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [object, array, string, integer, number, boolean, null]
      required:
        type: array
        items:
          type: string
      properties:
        type: object
        additionalProperties:
          $ref: '#/$defs/schema'
      items:
        oneOf:
          - $ref: '#/$defs/schema'
          - type: array
            items:
              $ref: '#/$defs/schema'
      description:
        type: string
      example: {}
      enum:
        type: array
        items: {}
