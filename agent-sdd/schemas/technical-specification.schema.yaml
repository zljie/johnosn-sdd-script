$schema: https://json-schema.org/draft/2020-12/schema
$id: https://agent-sdd.dev/schemas/technical-specification.schema.yaml
title: TechnicalSpecification
description: Technical Specification (TS) produced by Technical Manager Agent.
version: 1.0.0

type: object
additionalProperties: false
required: [id, title, productSpecId, architectureOverview, tasks, status, traceability]
properties:
  id:
    type: string
    pattern: '^TS-[0-9]{3,}$'
  title:
    type: string
  productSpecId:
    type: string
    pattern: '^PS-[0-9]{3,}$'
  architectureOverview:
    type: string
  affectedComponents:
    type: array
    items:
      type: string
  tasks:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, storyId, title, type, owner, status, estimate, doneCriteria]
      properties:
        id:
          type: string
          pattern: '^TASK-[0-9]{3,}$'
        storyId:
          type: string
          pattern: '^US-[0-9]{3,}$'
        title:
          type: string
        type:
          type: string
          enum: [Frontend, Backend, Database, API, Integration, Security, Infrastructure, Testing, Documentation]
        owner:
          type: string
        description:
          type: string
        inputs:
          type: array
          items:
            type: object
        outputs:
          type: array
          items:
            type: object
        dependencies:
          type: object
          properties:
            dependsOn:
              type: array
              items:
                type: string
            blockedBy:
              type: array
              items:
                type: string
            next:
              type: array
              items:
                type: string
        estimate:
          type: object
          required: [storyPoints, complexity]
          properties:
            storyPoints:
              type: integer
              minimum: 1
              maximum: 21
            personDays:
              type: number
              minimum: 0
            complexity:
              type: string
              enum: [Low, Medium, High, VeryHigh]
            priority:
              type: string
              enum: [P0, P1, P2, P3]
        risk:
          type: object
          properties:
            level:
              type: string
              enum: [Low, Medium, High, Critical]
            description:
              type: string
            mitigation:
              type: string
        doneCriteria:
          type: array
          minItems: 1
          items:
            type: string
        parallelizable:
          type: boolean
          default: false
        hitlGate:
          type: boolean
          default: false
        status:
          type: string
          enum: [Draft, Ready, InProgress, Review, Testing, Done, Blocked]
  risk:
    type: object
  metadata:
    type: object
    properties:
      owner:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      version:
        type: string
  status:
    type: string
    enum: [Draft, Ready, Approved, Implemented, Verified, Released, Archived]
  traceability:
    type: object
    required: [productSpecId]
    properties:
      productSpecId:
        type: string
        pattern: '^PS-[0-9]{3,}$'
      architectureDesignId:
        type: string
        pattern: '^AD-[0-9]{3,}$'
